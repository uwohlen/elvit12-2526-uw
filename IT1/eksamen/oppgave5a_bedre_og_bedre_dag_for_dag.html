<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oppgave 5</title>
  <style>
  </style>
</head>
<body>
  <h1>Knapper og tekstfelt</h1>
  <div id="knappDivID"></div>
  <div>
    <p id="tekstID"></p>
  </div>
  <script>
    let knappDIV = document.getElementById("knappDivID");
    let tekstEL = document.getElementById("tekstID");

    let navn = ["Anne","Berit","Cecilie","Dagny"];
    let alder = [22,55,77,45];

    let HTMLtekstForKnapper = "";

    for (let i=0; i<navn.length; i++) {
      HTMLtekstForKnapper += "<button value='" + alder[i] + "''>" + navn[i] + "</button>";
    }

    knappDIV.innerHTML = HTMLtekstForKnapper;

    let knappELs = document.getElementsByTagName("button");

    for (let i=0; i<knappELs.length; i++) {
      knappELs[i].addEventListener("click",alderFunk);
    }

    function alderFunk(event) {
      tekstEL.innerText = event.target.innerText + " er " + event.target.value + " år.";
    }

  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oppgave 5</title>
  <style>
  </style>
</head>
<body>
  <h1>Knapper og tekstfelt</h1>
  <button id="anneID" value="22">Anne</button>
  <button id="beritID" value="55">Berit</button>
  <button id="cecilieID" value="77">Cecilie</button>
  <button id="dagnyID" value="45">Dagny</button>
  <p id="tekstID"></p>
  <script>
    let anneEL = document.getElementById("anneID");
    let beritEL = document.getElementById("beritID");
    let cecilieEL = document.getElementById("cecilieID");
    let dagnyEL = document.getElementById("dagnyID");
    let tekstEL = document.getElementById("tekstID");

    anneEL.addEventListener("click",alderFunk);
    beritEL.addEventListener("click",alderFunk);
    cecilieEL.addEventListener("click",alderFunk);
    dagnyEL.addEventListener("click",alderFunk);

    function alderFunk(event) {
      tekstEL.innerText = event.target.innerText + " er " + event.target.value + " år.";
    }

  </script>
</body>
</html>

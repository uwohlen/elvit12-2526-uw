<!DOCTYPE html>
<html lang='no'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Array 3D</title>
    <style>
        table, th, td {
            border: solid 1px black;
            padding: 5px;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <table>
        <thead id="headID"></thead>
        <tbody id="tabID"></tbody>
    </table>
    <script>

        // Sammenligningsfunksjon for sort()-funksjonen til 2D-arrays
        // Sorterer fra størst til minst
        // Sorterer på kolonne med index 4
        function sammenlign4(a,b) {
            if (a[4] > b[4]) {
                return -1;
            }
            else if (a[4] < b[4]) {
                return 1;
            }
            else {
                return 0;
            }
        }

        let headEL = document.getElementById("headID");
        let tabEL = document.getElementById("tabID");

        let overskrifter = ["Navn","Klasse","Alder","Karakterer"];

        let resultat = [
            ["Per","3STA",20,[5,3,4,4,5,3,4,5,6]],
            ["Pål","3STA",19,[4,3,4,5,3,4,5,6,4]],
            ["Espen","3STB",18,[2,3,4,5,3,4,5,6,4]],
            ["Kari","3STB",19,[2,3,4,6,2,1,3,5,5]]
        ];

        overskrifter.push("Snitt");

        for (let i=0; i<resultat.length; i++) {
            let sum = 0;
            for (let j=0; j<resultat[i][3].length; j++){
                sum += resultat[i][3][j];
            }
            let snitt = sum / resultat[i][3].length;
            resultat[i].push(Math.round(snitt*10)/10);
        }

        resultat.sort(sammenlign4)

        let tekst = "<tr>";
        for (let i=0; i<overskrifter.length; i++) {
                tekst += "<th>" + overskrifter[i] + "</th>";
            } 
        tekst += "</tr>";
        headEL.innerHTML += tekst;

        tekst = "";
        for (let i=0; i<resultat.length; i++) {
            tekst += "<tr>";
            for (let j=0; j<resultat[i].length; j++) {
                if (j === resultat[i].length-1) {
                    tekst += "<td>" + resultat[i][j].toFixed(1) + "</td>";
                }
                else {
                    tekst += "<td>" + resultat[i][j] + "</td>";
                }
            }    
            tekst += "</tr>";            
        }

       tabEL.innerHTML = tekst;


       
    </script>
</body>
</html>

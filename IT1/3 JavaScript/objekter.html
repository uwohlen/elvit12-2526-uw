<!DOCTYPE html>
<html lang='no'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Objekter</title>
    <style>
        table, th, td {
            border: solid 1px black;
            padding: 5px;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <table>
        <thead id="headID"></thead>
        <tbody id="tabID"></tbody>
    </table>
    <script>

        
        let headEL = document.getElementById("headID");
        let tabEL = document.getElementById("tabID");

        let overskrifter = ["Navn","Klasse","Alder","Karakterer"];

        let elever = [
            {
                navn: "Per",
                klasse: "3STA",
                alder: 20,
                karakterer:[5,3,4,4,5,3,4,5,6]
            },
            {
                navn: "Pål",
                klasse: "3STA",
                alder: 19,
                karakterer: [4,3,4,5,3,4,5,6,4]
            },
            {
                navn: "Espen",
                klasse: "3STB",
                alder: 18,
                karakterer: [2,3,4,5,3,4,5,6,4]
            },
            {
                navn: "Kari",
                klasse: "3STB",
                alder: 19,
                karakterer: [2,3,4,6,2,1,3,5,5]
            }           
        ];   

        //console.log(elever[0].navn) //Per
        //console.log(elever[3].karakterer[4]) //2
        //console.log(elever)
        
        for (let i=0; i<elever.length; i++) {
            let sum = 0;
            for (let j=0; j<elever[i].karakterer.length; j++){
                sum += elever[i].karakterer[j];
            }
            let snitt = sum / elever[i].karakterer.length;
            elever[i].snitt = snitt;
        }

        let tekst = "<tr>";
        for (let i=0; i<overskrifter.length; i++) {
            tekst += "<th>" + overskrifter[i] + "</th>";
        } 
        tekst += "</tr>";
        headEL.innerHTML = tekst;
        
        tekst = "";
        for (let i=0; i<elever.length; i++) {
            tekst += "<tr><td>" + elever[i].navn + "</td><td>" + elever[i].klasse 
            + "</td><td>" + elever[i].alder + "</td><td>" + elever[i].snitt.toFixed(1) + "</td></tr>";
        }

        tabEL.innerHTML = tekst;

    </script>
</body>
</html>

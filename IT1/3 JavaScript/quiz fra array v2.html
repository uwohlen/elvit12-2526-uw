<!DOCTYPE html>
<html lang="no">
<head>
	<meta charset="utf-8">
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Quiz</title>
    <style>
        body {
            background-color: lemonchiffon;
        }
        button, input[type="button"], input[type="radio"], input[type="checkbox"] {
            cursor: pointer;
        }
        table, th, td {
            border: solid 1px black;
            padding: 5px;
            border-collapse: collapse;
        }
        /*#mediaID {
            height: 300px;
        }*/
    </style>
</head>
<body>
    <h1>Quiz</h1>
    <div id="mediaID"></div>
    <p id="spmID"></p>
    <p id="alternativID"></p>
    <button id="svarAvgittID">Svar avgitt</button>
	
<script>
    let mediaEL = document.getElementById("mediaID");
    let spmEL = document.getElementById("spmID");
    let alternativEL = document.getElementById("alternativID");
    let svarAvgittEL = document.getElementById("svarAvgittID");
    
    //Bruker arrays for å lette utvidelse med flere spørsmål
    
    let info = [
        [
            "<video height='300' controls><source src='media/oslo.mp4' type='video/mp4'></video>",
            "Hva heter Norges hovedstad?",
            ["Oslo","Stockholm","København","Madrid"],
            [1,-1,-1,-1],
            "radio"
        ],
        [
            "<img src='media/london.jpg' height='300'>",
            "Hvilke byer ligger i Europa?",
            ["Oslo","New York","London","Mos Eisley","Trondheim"],
            [1/3,-1,1/3,-1,1/3],
            "checkbox"
        ],
        [
            "<audio controls><source src='media/maker.mp3' type='audio/mpeg'></audio>",
            "Hvilken innsjø er Norges største?",
            ["Røssvatnet","Mjøsa","Femunden"],
            [-1,1,-1],
            "radio"
        ],
        [
            "<img src='media/hjerte.png' height='300'>",
            "Hva er det viktigste organet i kroppen?",
            ["Stortåa","Nesen","Hjertet"],
            [-1,-1,1],
            "radio"
        ],
        [
            "",
            "Går det bra uten mediafil?",
            ["Ja","Nei"],
            [1,-1],
            "radio"
        ],
        [
            "<img src='media/andalsnes.JPG' height='300'>",
            "Hvilken by er dette?",
            ["Molde","Ålesund","Åndalsnes"],
            [-1,-1,1],
            "radio"
        ]
    ]


    function visSpm(nr) {
        mediaEL.innerHTML = info[nr][0];
        spmEL.innerHTML = info[nr][1];
        
        let tekst = "";
        for (let j=0; j<info[nr][2].length; j++) {
            tekst += "<input class='altClass' type='" + info[nr][4] + "' name='svaralternativer' value="+ info[nr][3][j] +">" + info[nr][2][j] + "<br>";
        }
        alternativEL.innerHTML = tekst;
    }
    
    let i = 0;
    visSpm(i);
    
    let poeng = [];
    let svar = [];
    let riktigsvar=[];
    
    svarAvgittEL.addEventListener("click",svarAvgittFunk);
    
    function svarAvgittFunk() {
        poeng[i] = 0;
        svar[i] = "";
        riktigsvar[i] = "";
        
        let sjekkbokser = document.getElementsByClassName("altClass");
        
        for (let k=0; k<sjekkbokser.length; k++) {
            if (info[i][3][k] > 0) {
                riktigsvar[i] += info[i][2][k] + " ";
            }
            if (sjekkbokser[k].checked) {
                poeng[i] += Number(sjekkbokser[k].value);
                svar[i] += info[i][2][k] + " ";
            }
        }
        
        i++;
        if (i < info.length) {
            visSpm(i);
        }
        else {
            mediaEL.innerHTML = "";
            spmEL.innerHTML = "";
            alternativEL.innerHTML = "";
            svarAvgittEL.style.visibility = "hidden";
            
            tekst = "<table><tr><th>Spørsmål</th><th>Fasit</th><th>Svar avgitt</th><th>Poeng</th>";
            
            let totalpoeng = 0;
            for (let m=0; m<info.length; m++) {
                totalpoeng += poeng[m];
                
                tekst += "<tr><td>" + info[m][1] 
                    + "</td><td>" + riktigsvar[m]
                    + "</td><td>" + svar[m]
                    + "</td><td>" + (poeng[m]).toFixed(1)
                    + "</td></tr>";
            }
            
            tekst += "</table>";
            spmEL.innerHTML = tekst;
            
            spmEL.innerHTML += "<br><p>Du fikk " + totalpoeng.toFixed(1) + " poeng totalt.</p>";
            
            if (totalpoeng > 0) {
                mediaEL.innerHTML = "<img src='media/smile.png' height='150'>";
            }
            else {
                mediaEL.innerHTML = "<img src='media/frown.png' height='150'>";
            }
        }
    }
    
</script>
</body>
</html>

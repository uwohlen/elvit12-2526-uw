<body>
  <h1>Prosjekt Euler, Problem nr Null</h1>
  <h2><a href="https://projecteuler.net/register">Oppgavetekst</a></h2>
  <p>Sjekk javascriptet på denne nettsiden for en mulig løsning om du står fast.</p>
  <script>
    let total = 0;
    let teller = 1;
    while (teller <= 242000) {
      let kvadrat = teller*teller;
      if (kvadrat % 2 === 1) {
        total += kvadrat;
      }
      teller ++;
    }
    console.log(total)
  </script>
